syntax = "proto3";

package auth;

option go_package = "proto/auth";

service AuthService {
  rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  string user_id = 1;
  string email = 2;
  string username = 3;
  bool valid = 4;
}